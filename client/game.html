<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="grupp 6">
    <title>Higher or Lower</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <header>
        <h1>Higher or Lower</h1>
    </header>
    <div class="content">
        <div class="leftMovie">
            <div class="movieinfo" id="leftMovieInfo">
                <div class="moviePoster">
                    <img src="../project-material/media/100009.png" alt="Poster left" id="leftPoster">
                </div>
                <h2 id="leftTitle">Tung tung sahur</h2>
                <p id="leftSecondInfo">Release Year: 2067</p>
            </div>
            <div class="infoButton">
                <button id="infoLeft">More info</button>
            </div>
        </div>
        <div class="rightMovie">
            <div class="movieinfo" id="rightMovieInfo">
                <div class="moviePoster">
                    <img src="../project-material/media/100029.png" alt="Poster right" id="rightPoster">
                </div>
                <h2 id="rightTitle">Arne alligator</h2>
                <p id="rightSecondInfo">Release Year: 2067</p>
            </div>
            <div class="infoButton">
                <button id="infoRight">More info</button>
            </div>
        </div>
        <div class="center">
            <h1>Higher or lower</h1>
            <p>Select gamemode or start</p>
            <div class="buttonContainer">
                <button id="startButton">Start</button>
                <button id="gamemodeButton">Change gamemode</button>
            </div>
        </div>
    </div>
</body>
</html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="grupp 6">
    <title>Higher or Lower</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <header>
        <h1>Higher or Lower</h1>
    </header>
    <div class="content">
        <div class="leftMovie">
            <div class="movieinfo">
                <div class="moviePoster">
                    <img src="../project-material/media/100009.png" alt="Poster left">
                </div>
                <h2>Tung tung sahur</h2>
                <p>Release Year: 2067</p>
            </div>
            <div class="infoButton">
                <button id="infoLeft">More info</button>
            </div>
        </div>
        <div class="rightMovie">
            <div class="movieinfo">
                <div class="moviePoster">
                    <img src="../project-material/media/100029.png" alt="Poster right">
                </div>
                <h2>Arne alligator</h2>
                <p>Release Year: 2067</p>
            </div>
            <div class="infoButton">
                <button id="infoRight">More info</button>
            </div>
        </div>
        <div class="center">
            <h1>Higher or lower</h1>
            <p>Select gamemode or start</p>
            <div class="buttonContainer">
                <button id="startButton">Start</button>
                <button id="gamemodeButton">Change gamemode</button>
            </div>
        </div>

        <div id="popcorn-container">
            <canvas id="c" width="800" height="2000"></canvas>
        </div>

        <script src="./physics-popcorn/popcorn.js" defer></script>
    </div>
</body>
</html>
